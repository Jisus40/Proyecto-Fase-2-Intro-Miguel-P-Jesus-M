<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Programa de Lealtad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="gestionar-rese%C3%B1as.style.css">
    <link rel="stylesheet" href="gestionar-lealtad.style.css">
</head>
<body>

<header class="admin-header">
    <a href="../admin.html" class="btn-regresar"><i class="fas fa-arrow-left"></i> Volver al Panel</a>
    <h1>Gestión de Lealtad</h1>
    <div></div>
</header>

<main class="container">
    <div class="card-puntos">
        <i class="fas fa-medal" style="font-size: 3rem; color: var(--gold);"></i>
        <h2>Puntos del Usuario Actual</h2>
        <div class="saldo-actual" id="display-puntos">0</div>
        <p style="color: gray;">Modifica el saldo de puntos manualmente</p>
        
        <div style="margin: 20px 0;">
            <input type="number" id="cantidad-ajuste" value="100">
        </div>

        <div class="controles">
            <button class="btn-accion btn-sumar" id="btn-sumar"><i class="fas fa-plus"></i> Sumar</button>
            <button class="btn-accion btn-restar" id="btn-restar"><i class="fas fa-minus"></i> Restar</button>
            <button class="btn-accion btn-reset" id="btn-reset"><i class="fas fa-sync"></i> Resetear</button>
        </div>
    </div>
</main>

<script src="gestionar-lealtad.script.js"></script>
</body>
</html>
