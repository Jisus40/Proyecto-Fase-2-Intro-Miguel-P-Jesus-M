<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gestionar-usuarios</title>
	<link rel="stylesheet" href="gestionar-usuarios.style.css">
</head>
<body>
	<header class="admin-header">
    <a href="../admin.html" class="btn-regresar">Volver al Panel</a>
    <h1>Control de Usuarios</h1>
    <div></div>
</header>

<main class="container">
    <div class="card">
        <h3>Bloquear Acceso</h3>
        <p>Escribe el nombre de usuario exacto para impedir su acceso.</p>
        <input type="text" id="usuario-a-bloquear" placeholder="Nombre de usuario...">
        <button id="btn-bloquear-accion" class="btn-bloquear">Bloquear Usuario</button>
    </div>

    <div class="card">
        <h3>Usuarios Bloqueados</h3>
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="lista-bloqueados"></tbody>
        </table>
    </div>
</main>
<script src="gestionar-usuarios.script.js"></script>
</body>
</html>
