<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente-Catálogo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="cliente.style.css">
</head>
<body>
    <header>
       <div class="usuar-icono">
            <i class="fas fa-user-circle" title="Cliente26"></i>
        </div>
        <nav class="links">
            <a href="#"><i class="fas fa-house"></i> Inicio</a>
            <a href="#"><i class="fas fa-clock-rotate-left"></i> Historial</a>
        </nav>
        <div class="carrito">
            <i class="fas fa-shopping-cart" title="Carrito"></i>
            <span class="contador">0</span>
        </div>
    </header>

    <main class="container">
        <h2>Catálogo de Productos</h2>
        
        <section class="catalogo">
            <div class="producto" data-id="pr1">
                <div class="pr-img img1"></div>
                <h2 class="pr-titulo">Empanadas</h2>
            </div>
            <div class="producto" data-id="pr2">
                <div class="pr-img img2"></div>
                <h2 class="pr-titulo">Pan Relleno</h2>
            </div>
            <div class="producto" data-id="pr3">
                <div class="pr-img img3"></div>
                <h2 class="pr-titulo">Tequeños</h2>
            </div>
            <div class="producto" data-id="pr4">
                <div class="pr-img img4"></div>
                <h2 class="pr-titulo">Postre de frambuesas con crema</h2>
            </div>
            <div class="producto" data-id="pr5">
                <div class="pr-img img5"></div>
                <h2 class="pr-titulo">Salchipapas</h2>
            </div>
            <div class="producto" data-id="pr6">
                <div class="pr-img img6"></div>
                <h2 class="pr-titulo">Sandwich</h2>
            </div>
            <div class="producto" data-id="pr7">
                <div class="pr-img img7"></div>
                <h2 class="pr-titulo">Hamburguesa</h2>
            </div>
            <div class="producto" data-id="pr8">
                <div class="pr-img img8"></div>
                <h2 class="pr-titulo">Postre de mandarinas con crema</h2>
            </div>
            <div class="producto" data-id="pr9">
                <div class="pr-img img9"></div>
                <h2 class="pr-titulo">Pizza</h2>
            </div>
            <div class="producto" data-id="pr10">
                <div class="pr-img img10"></div>
                <h2 class="pr-titulo">Pollo frito</h2>
            </div>
        </section>
    </main>
<script src="cliente.script.js"></script>
</body>
</html>
